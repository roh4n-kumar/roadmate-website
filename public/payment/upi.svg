<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <!-- UPI text - bold italic white for dark mode -->
  <text x="5" y="48" font-size="50" font-weight="900" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-style="italic" fill="#ffffff" letter-spacing="-1">UPI</text>
  
  <!-- UPI Arrow - Right pointing arrowhead split Orange/Green -->
  <!-- Orange top half -->
  <path d="M140,12 L165,33 L140,33 Z" fill="#F37021"/>
  <!-- Green bottom half -->
  <path d="M140,33 L165,54 L140,54 Z" fill="#097A3A"/>
  
  <!-- The iconic UPI arrow also has a layered look sometimes, but the split arrowhead is the most recognizable. -->
</svg>
