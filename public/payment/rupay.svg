<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100">
    <!-- RuPay Wordmark -->
    <g transform="translate(15, 75) skewX(-15)">
        <text x="0" y="0" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="78" fill="#ffffff" letter-spacing="-3">RuPay</text>
    </g>

    <!-- Arrow Mark (Double TRIANGLES) -->
    <!-- Shifted X to 265 to eliminate overlap with the 'y' letter -->
    <g transform="translate(265, 10) skewX(-15)">
        <!-- Green Triangle (Background) -->
        <!-- Shifted by X=12, Y=-8 relative to Saffron. Made slender (width 25) -->
        <polygon points="12,-8 37,29.5 12,67" fill="#008c44"/>
        
        <!-- Saffron Triangle (Foreground) -->
        <!-- Slender profile: Width 25, Height 75 -->
        <polygon points="0,0 25,37.5 0,75" fill="#f37021"/>
    </g>
</svg>