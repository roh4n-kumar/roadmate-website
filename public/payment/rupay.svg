<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100">
    <!-- RuPay Wordmark -->
    <g transform="translate(15, 75) skewX(-15)">
        <text x="0" y="0" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="78" fill="#ffffff" letter-spacing="-3">RuPay</text>
    </g>

    <!-- Arrow Mark (Geometric Identical Overlapping Triangles) -->
    <!-- Positioned elegantly 265px right. -->
    <!-- Saffron Bottom tip reaches exactly the baseline descender of 'y'. -->
    <!-- Green is shifted UP and RIGHT relative to Saffron. -->
    <g transform="translate(265, 0) skewX(-15)">
        <!-- Green Triangle (Background) -->
        <!-- Shifted by X=13, Y=-12. Height = 80, Width = 26 -->
        <!-- Top: 13,-2 | Right Tip: 39,38 | Bottom: 13,78 -->
        <polygon points="13,-2 39,38 13,78" fill="#008c44"/>
        
        <!-- Saffron Triangle (Foreground) -->
        <!-- Top: 0,10 | Right Tip: 26,50 | Bottom: 0,90 -->
        <polygon points="0,10 26,50 0,90" fill="#f37021"/>
    </g>
</svg>