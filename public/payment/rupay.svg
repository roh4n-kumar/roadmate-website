<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100">
    <!-- RuPay Wordmark -->
    <g transform="translate(15, 75) skewX(-15)">
        <text x="0" y="0" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="78" fill="#ffffff" letter-spacing="-3">RuPay</text>
    </g>

    <!-- Official Extracted RuPay Arrow Geometry -->
    <!-- Placed cleanly right of the text. The specific slant is built into the coordinates, no skew required. -->
    <!-- Adjusted translation to tightly nestle the arrow next to the 'y'. -->
    <g transform="translate(268, 10)">
        <!-- Green Triangle -->
        <!-- Exact identical path. A pure horizontal shift of 14px perfectly creates the top/bottom inter-arrow gap. -->
        <polygon points="14,0 34,40 -8,80" fill="#008c44"/>
        
        <!-- Saffron Triangle -->
        <polygon points="0,0 20,40 -22,80" fill="#f37021"/>
    </g>
</svg>