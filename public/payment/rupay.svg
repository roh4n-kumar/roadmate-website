<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100">
  <!-- RuPay Wordmark - Standardized slant -->
  <g transform="skewX(-15)">
    <text x="10" y="72" font-family="'Inter', Arial, sans-serif" font-weight="900" font-size="74" fill="#ffffff" letter-spacing="-2.5">RuPay</text>
  </g>

  <!-- Official Solid Double-Arrowhead -->
  <g transform="translate(255, 18) skewX(-15)">
    <!-- Orange Saffron Arrowhead (Solid) -->
    <path d="M0,0 L35,32 L0,64 L15,32 Z" fill="#F37021" />
    <!-- Green Arrowhead (Solid) -->
    <path d="M22,0 L57,32 L22,64 L37,32 Z" fill="#097A3A" />
  </g>
</svg>
