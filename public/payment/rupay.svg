<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100">
  <!-- RuPay Wordmark - Precision Skew and Spacing -->
  <g transform="translate(10, 72) skewX(-15)">
    <text x="0" y="0" font-family="'Inter', Arial, sans-serif" font-weight="900" font-size="74" fill="#ffffff" letter-spacing="-3">RuPay</text>
  </g>

  <!-- Official RuPay Double-Chevron (Nested Construction) -->
  <g transform="translate(255, 18) skewX(-15)">
    <!-- Orange Saffron Chevron (Solid) -->
    <path d="M0,0 L35,32 L0,64 L15,32 Z" fill="#F37021" />
    <!-- Green Chevron (Solid, nested with a matching V-cutout) -->
    <path d="M18,0 L53,32 L18,64 L33,32 Z" fill="#097A3A" />
  </g>
</svg>
